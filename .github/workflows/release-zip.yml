name: Attach FableGear.zip to release

# Every release needs a FableGear.zip containing the bootstrap FableGear.app
# bundle so the in-app update checker can resolve
# https://github.com/.../releases/latest/download/FableGear.zip. The bundle
# itself is committed at packaging/FableGear.app/ — when users unzip the
# download they get a double-clickable .app that clones the repo on first
# run and hands off to launch.sh afterwards.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-zip:
    runs-on: macos-latest
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Build FableGear.app bundle
        run: |
          mkdir -p dist/FableGear.app/Contents/MacOS
          mkdir -p dist/FableGear.app/Contents/Resources
          
          # Create launcher script
          cat > dist/FableGear.app/Contents/MacOS/FableGear << 'LAUNCHER'
          #!/bin/bash
          # FableGear bootstrap launcher
          # First run: clones the repo. Every run: hands off to launch.sh.
          
          PARENT_DIR="$HOME/FableGear"
          INSTALL_DIR="$PARENT_DIR/FableGear"
          REPO_URL="https://github.com/fabledharbinger0993/FableGear.git"
          
          if [ -d "$INSTALL_DIR/.git" ]; then
            # Already installed — hand off to launch.sh (handles git pull + server start)
            bash "$INSTALL_DIR/launch.sh"
          else
            # First install — open Terminal so the user can see clone + setup progress
            CLONE_CMD="mkdir -p '$PARENT_DIR' && git clone '$REPO_URL' '$INSTALL_DIR' && bash '$INSTALL_DIR/launch.sh'"
            osascript -e "tell application \"Terminal\" to do script \"$CLONE_CMD\""
            osascript -e "tell application \"Terminal\" to activate"
          fi
          LAUNCHER
          chmod +x dist/FableGear.app/Contents/MacOS/FableGear
          
          # Create Info.plist
          cat > dist/FableGear.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>FableGear</string>
            <key>CFBundleIdentifier</key>
            <string>com.fabledharbinger.fablegear</string>
            <key>CFBundleName</key>
            <string>FableGear</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.event.release.tag_name }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.event.release.tag_name }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          
          # Create PkgInfo
          echo -n "APPL????" > dist/FableGear.app/Contents/PkgInfo
          
          # Create app icon from PNG (prefer new icon, fall back to legacy)
          ICON_SRC="static/icon-fablegear-app.png"
          [ ! -f "$ICON_SRC" ] && ICON_SRC="static/RB_LOGO.png"
          
          if [ -f "$ICON_SRC" ]; then
            ICONSET_DIR="$(mktemp -d)/fablegear.iconset"
            mkdir -p "$ICONSET_DIR"
            for size in 16 32 64 128 256 512; do
              sips -z $size $size "$ICON_SRC" --out "$ICONSET_DIR/icon_${size}x${size}.png" >/dev/null 2>&1
              double=$((size * 2))
              sips -z $double $double "$ICON_SRC" --out "$ICONSET_DIR/icon_${size}x${size}@2x.png" >/dev/null 2>&1
            done
            iconutil -c icns "$ICONSET_DIR" -o dist/FableGear.app/Contents/Resources/applet.icns
          fi

      - name: Build FableGear.zip
        run: |
          cd dist
          zip -r -y /tmp/FableGear.zip FableGear.app
          unzip -l /tmp/FableGear.zip

      - name: Upload FableGear.zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" /tmp/FableGear.zip --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload install.sh to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" install.sh --clobber --repo "$GITHUB_REPOSITORY"
