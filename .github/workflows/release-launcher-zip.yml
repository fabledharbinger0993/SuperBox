name: Attach FableGearLauncher.zip to release

# Builds the day-to-day Dock/Applications launcher .app (AppleScript-based)
# and attaches it to every published release as FableGearLauncher.zip.
#
# This is distinct from FableGear.zip (the bootstrap that clones on first run).
# FableGearLauncher.zip is for users who already have FableGear installed and
# want a clean Dock icon — double-click runs launch.sh directly.
#
# Standard install path assumed: ~/FableGear/FableGear/ (set by bootstrap)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-launcher-zip:
    runs-on: macos-latest
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Write launcher AppleScript
        run: |
          cat > /tmp/FableGearLauncher.applescript << 'EOF'
          -- FableGearLauncher.applescript
          -- Day-to-day Dock/Applications launcher for FableGear
          -- Assumes FableGear was installed via the bootstrap FableGear.app
          -- Standard install path: ~/FableGear/FableGear/
          do shell script "bash \"$HOME/FableGear/FableGear/launch.sh\" > /dev/null 2>&1 &"
          EOF

      - name: Compile launcher .app
        run: |
          mkdir -p dist
          osacompile -o "dist/FableGear Launcher.app" /tmp/FableGearLauncher.applescript

      - name: Apply icon
        run: |
          ICON_SRC="static/icon-fablegear-app.png"
          [ ! -f "$ICON_SRC" ] && ICON_SRC="static/FG_LOGO.png"
          if [ -f "$ICON_SRC" ]; then
            ICONSET="$(mktemp -d)/fg.iconset"
            mkdir -p "$ICONSET"
            for size in 16 32 64 128 256 512; do
              sips -z $size $size "$ICON_SRC" --out "$ICONSET/icon_${size}x${size}.png" >/dev/null 2>&1
              double=$((size * 2))
              sips -z $double $double "$ICON_SRC" --out "$ICONSET/icon_${size}x${size}@2x.png" >/dev/null 2>&1
            done
            iconutil -c icns "$ICONSET" -o "dist/FableGear Launcher.app/Contents/Resources/applet.icns" 2>/dev/null || true
          fi

      - name: Build FableGearLauncher.zip
        run: |
          cd dist
          zip -r -y /tmp/FableGearLauncher.zip "FableGear Launcher.app"
          unzip -l /tmp/FableGearLauncher.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/FableGearLauncher.zip --clobber --repo "$GITHUB_REPOSITORY"
