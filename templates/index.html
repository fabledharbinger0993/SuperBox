<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RekitBox — rekordbox-toolkit</title>

  <link rel="stylesheet" href="/static/rekitbox.css">
  <link rel="icon" type="image/png" href="/static/RB_LOGO.png">

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RekitGo">
  <link rel="apple-touch-icon" href="/static/icon-rekitgo.png">
  <meta name="theme-color" content="#ff6600">

  <style>
    /* RekitBox modal animation system */
    @keyframes sb-modal-in    {from{opacity:0;transform:scale(.92) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes sb-modal-out   {from{opacity:1;transform:scale(1) translateY(0)} to{opacity:0;transform:scale(.95) translateY(6px)}}
    @keyframes sb-modal-shrink{0%{opacity:1;transform:scale(1) translate(0,0)} 100%{opacity:0;transform:scale(.06) translate(52vw,46vh)}}
    @keyframes sb-pill-appear {from{opacity:0;transform:scale(.55) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes sb-backdrop-in {from{opacity:0} to{opacity:1}}
    @keyframes sb-backdrop-out{from{opacity:1} to{opacity:0}}

    /* Global Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background-color: var(--bg); 
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>

  <div id="rekki-app">
    <!-- Header/Indicator -->
    <div style="position:fixed;top:10px;right:20px;z-index:1000;font-size:.92rem;color:var(--accent);background:rgba(168,85,247,.07);padding:4px 12px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);">
      <span id="rekki-mode-indicator">RekitBox</span>
    </div>

    <!-- Main Content Area -->
    <div class="pipe-wiz-p2-body" style="display:flex;flex:1;overflow:hidden;min-height:0;">
      <div id="pipe-wiz-stack" style="width:210px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);padding:10px 0;display:flex;flex-direction:column;gap:4px;"></div>
      <div id="pipe-wiz-active-cfg" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;">
        <div style="color:var(--text-dim);font-size:.84rem;margin:auto;text-align:center;">Select a step on the left to configure it.</div>
      </div>
    </div>

    <!-- Progress Footer -->
    <div id="wiz-progress-strip" style="padding:6px 20px;border-top:1px solid var(--border);font-size:.75rem;color:var(--text-dim);display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <span id="wiz-progress-label">0 / 0 steps ready</span>
      <div style="flex:1;height:3px;background:var(--surface-hi);border-radius:2px;overflow:hidden;">
        <div id="wiz-progress-bar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .3s;"></div>
      </div>
    </div>
  </div>

</body>
</html>
